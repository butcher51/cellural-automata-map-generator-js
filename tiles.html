<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tile Index Showroom</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #1a1a1a;
        }
        #info-bar {
            background-color: #2a2a2a;
            color: #fff;
            padding: 12px 20px;
            font-family: monospace;
            font-size: 16px;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }
        #tile-index {
            color: #4fc3f7;
        }
        #tileset-name {
            color: #81c784;
        }
        #canvas-container {
            flex: 1;
            display: flex;
            gap: 24px;
            overflow: auto;
            padding: 20px;
        }
        .tileset-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }
        .tileset-label {
            color: #aaa;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 8px;
        }
        canvas {
            border: 1px solid #333;
            image-rendering: pixelated;
            cursor: crosshair;
        }
    </style>
</head>
<body>
    <div id="info-bar">
        Tileset: <span id="tileset-name">—</span> &nbsp;|&nbsp; Tile Index: <span id="tile-index">—</span>
    </div>
    <div id="canvas-container"></div>
    <script type="module" src="tiles.js"></script>
</body>
</html>
