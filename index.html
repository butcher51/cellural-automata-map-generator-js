<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Generator</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh; /* Fallback for older browsers */
            height: 100dvh; /* Dynamic viewport height for mobile */
            background-color: #1a1a1a;
        }
        #toolbar {
            width: 100%;
            height: 100px;
            background-color: #2a2a2a;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 10px;
            flex-shrink: 0;
        }
        .tool-button {
            padding: 12px 24px;
            font-size: 16px;
            font-family: sans-serif;
            background-color: #3a3a3a;
            color: #ccc;
            border: 2px solid #4a4a4a;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .tool-button:hover {
            background-color: #4a4a4a;
        }
        .seed-input {
            width: 120px;
            padding: 10px 12px;
            font-size: 16px;
            font-family: monospace;
            background-color: #3a3a3a;
            color: #ccc;
            border: 2px solid #4a4a4a;
            border-radius: 6px;
            outline: none;
        }
        .seed-input:focus {
            border-color: #7a7a7a;
            color: #fff;
        }
        .tool-button.active {
            background-color: #5a5a5a;
            border-color: #7a7a7a;
            color: #fff;
        }
        #canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        canvas {
            border: 1px solid #333;
        }
        #layer-debug-panel {
            position: fixed;
            top: 110px;
            right: 10px;
            background-color: rgba(30, 30, 30, 0.85);
            color: #ccc;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            z-index: 100;
            min-width: 150px;
        }
        #layer-debug-panel h3 {
            margin: 0 0 6px 0;
            font-size: 13px;
            color: #fff;
        }
        .layer-entry {
            padding: 4px 6px;
            margin: 2px 0;
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .layer-delete-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 12px;
            padding: 0 4px;
            font-family: monospace;
        }
        .layer-delete-btn:hover {
            color: #ff6666;
        }
        .layer-entry:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        .layer-entry.active {
            background-color: rgba(100, 180, 255, 0.25);
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="toolbar">
        <button id="tree-1-tool" class="tool-button active">T1</button>
        <button id="tree-2-tool" class="tool-button">T2</button>
        <button id="tree-3-tool" class="tool-button">T3</button>
        <button id="tree-4-tool" class="tool-button">T4</button>
        <button id="pine-1-tool" class="tool-button">P1</button>
        <button id="water-tool" class="tool-button">Water</button>
        <button id="cliff-tool" class="tool-button">Cliff</button>
        <button id="eraser-tool" class="tool-button">Eraser</button>
        <button id="zoom-out" class="tool-button">-</button>
        <button id="zoom-in" class="tool-button">+</button>
        <input id="seed-input" class="seed-input" type="number" value="1">
        <button id="new-seed-button" class="tool-button">New seed</button>
    </div>
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
    <div id="layer-debug-panel">
        <h3>Layers</h3>
        <div id="layer-list"></div>
    </div>
    <script type="module" src="generator.js"></script>
</body>
</html>
